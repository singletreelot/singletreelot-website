name: Deploy Single Tree Complete

on:
  push:
    branches: [ main, complete ]
  workflow_dispatch:

env:
  # 使用Node.js 24运行actions
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js 20 for application
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'
      
      - name: Install dependencies
        run: |
          # 确保有package-lock.json
          if [ ! -f "package-lock.json" ]; then
            echo "Generating package-lock.json..."
            npm init -y
            npm install next@13.5.6 react@18.2.0 react-dom@18.2.0 --save
            npm install tailwindcss@3.3.0 autoprefixer@10.4.0 postcss@8.4.0 --save-dev
          fi
          npm ci --no-audit
      
      - name: Build Next.js application
        run: npm run build
        env:
          NODE_ENV: production
      
      - name: Export static site
        run: npm run export
      
      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out
          retention-days: 1
  
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
      
      - name: Verify deployment
        run: |
          echo "✅ Deployment successful!"
          echo "🌐 Website URL: https://singletreelot.github.io/singletreelot-website/"
          echo "📅 Deployed at: $(date)"
          echo "🔧 Node.js version: 20 (app) / 24 (actions)"