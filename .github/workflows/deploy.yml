name: Deploy Single Tree Complete

on:
  push:
    branches: [ main, complete ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Create package.json if missing
        run: |
          if [ ! -f "package.json" ]; then
            echo '{
              "name": "singletree-complete",
              "version": "1.0.0",
              "private": true,
              "scripts": {
                "dev": "next dev",
                "build": "next build",
                "start": "next start",
                "export": "next export"
              },
              "dependencies": {
                "next": "13.5.6",
                "react": "18.2.0",
                "react-dom": "18.2.0"
              },
              "devDependencies": {
                "tailwindcss": "3.3.0",
                "autoprefixer": "10.4.0",
                "postcss": "8.4.0"
              }
            }' > package.json
          fi
      
      - name: Install dependencies with npm install (not ci)
        run: |
          # 删除可能的问题文件
          rm -f package-lock.json yarn.lock npm-shrinkwrap.json
          
          # 使用npm install而不是npm ci
          npm install --no-audit --no-fund --loglevel=error
          
          # 创建简单的lockfile避免警告
          echo '{"name":"singletree-complete","version":"1.0.0","lockfileVersion":3}' > package-lock.json
      
      - name: Build Next.js application
        run: npm run build
        env:
          NODE_ENV: production
          NEXT_TELEMETRY_DISABLED: 1
      
      - name: Export static site
        run: npm run export
      
      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out
          retention-days: 1
  
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
      
      - name: Verify deployment
        run: |
          echo "✅ Deployment successful!"
          echo "🌐 Website URL: https://singletreelot.github.io/singletreelot-website/"
          echo "📅 Deployed at: $(date)"
          echo "🔧 Used npm install instead of npm ci"