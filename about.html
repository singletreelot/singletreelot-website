<!DOCTYPE html>

    <link rel="stylesheet" href="assets/css/styles.css">

<body>
    <nav class="bg-white shadow">
        <div class="container py-4">
            <a href="index.html" class="inline-flex items-center text-[#5D4037] hover:text-[#7CB342]">
                <i class="fas fa-arrow-left mr-2"></i>
                返回首页
            </a>
        </div>
    </nav>

    <main class="container py-12">
        <div class="text-center mb-12">
            <h1 class="text-4xl font-bold text-gray-900 mb-4">关于 Single Tree Lot</h1>
            <p class="text-xl text-gray-600">我们的使命、愿景和团队</p>
        </div>
        
        <div class="bg-white rounded-xl shadow-lg p-8 mb-8">
            <h2 class="text-2xl font-bold text-gray-900 mb-6">我们的使命</h2>
            <p class="text-gray-700 mb-6">
                建立全球首个单株咖啡追溯与品质标准体系，重新定义精品咖啡行业标准。
                我们相信，每杯咖啡都应该有故事，每棵咖啡树都应该被尊重。
            </p>
            
            <div class="grid md:grid-cols-2 gap-8">
                <div>
                    <h3 class="text-xl font-bold text-gray-900 mb-4">愿景</h3>
                    <ul class="space-y-3">
                        <li class="flex items-start">
                            <i class="fas fa-check text-[#7CB342] mt-1 mr-3"></i>
                            <span>建立全球统一的单株咖啡标准</span>
                        </li>
                        <li class="flex items-start">
                            <i class="fas fa-check text-[#7CB342] mt-1 mr-3"></i>
                            <span>保护咖啡种植者权益和收益</span>
                        </li>
                        <li class="flex items-start">
                            <i class="fas fa-check text-[#7CB342] mt-1 mr-3"></i>

                        </li>
                    </ul>
                </div>
                
                <div>
                    <h3 class="text-xl font-bold text-gray-900 mb-4">价值观</h3>
                    <ul class="space-y-3">
                        <li class="flex items-start">
                            <i class="fas fa-star text-[#7CB342] mt-1 mr-3"></i>
                            <span>透明 - 全程可追溯，信息透明</span>
                        </li>
                        <li class="flex items-start">
                            <i class="fas fa-star text-[#7CB342] mt-1 mr-3"></i>
                            <span>公平 - 种植者合理回报，公平交易</span>
                        </li>
                        <li class="flex items-start">
                            <i class="fas fa-star text-[#7CB342] mt-1 mr-3"></i>
                            <span>可持续 - 生态友好，长期发展</span>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
        
        <div class="bg-gray-50 rounded-xl p-8 text-center">
            <h2 class="text-2xl font-bold text-gray-900 mb-6">联系我们</h2>
            <p class="text-gray-700 mb-6">
                如果您对我们的标准体系感兴趣，或想了解更多信息，请随时联系我们。
            </p>
            <a href="contact.html" class="btn btn-primary">
                <i class="fas fa-envelope mr-2"></i>
                发送消息
            </a>
